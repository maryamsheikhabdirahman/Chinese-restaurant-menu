<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 140" width="600" height="140" role="img" aria-label="Maryamas Chinese Restaurant logo">
  <defs>
    <linearGradient id="g1" x1="0" x2="1">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="50%" stop-color="#ff3ec6"/>
      <stop offset="100%" stop-color="#7cffb2"/>
    </linearGradient>
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .brand{font-family: 'Segoe UI', Roboto, Arial, Helvetica, sans-serif; font-weight:700; font-size:48px}
      .sub{font-family: 'Segoe UI', Roboto, Arial, Helvetica, sans-serif; font-size:14px; fill:#ddd}
    </style>
  </defs>

  <!-- black rounded background -->
  <rect x="6" y="6" width="588" height="128" rx="16" ry="16" fill="#060606" />

  <!-- neon main text with glow -->
  <g filter="url(#neon)">
    <text x="36" y="78" class="brand" fill="url(#g1)" stroke="rgba(255,255,255,0.05)" stroke-width="0.6">Maryamas</text>
    <text x="38" y="78" class="brand" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="0.3">Maryamas</text>
  </g>

  <!-- subtitle -->
  <text x="36" y="104" class="sub">Chinese Restaurant</text>

  <!-- small accent neon mark -->
  <g transform="translate(480,18)">
    <circle cx="0" cy="0" r="22" fill="url(#g1)" opacity="0.95" />
    <text x="-7" y="7" font-size="18" fill="#070707" font-weight="700">M</text>
  </g>
</svg>